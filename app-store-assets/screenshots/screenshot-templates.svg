<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <!-- Phone frame -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Gradient backgrounds -->
    <linearGradient id="dashboardGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEF7FF"/>
      <stop offset="100%" stop-color="#E1EFFE"/>
    </linearGradient>
    <linearGradient id="scheduleGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="healthGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DBEAFE"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
    <linearGradient id="financeGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BFDBFE"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
    <linearGradient id="discoveryGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="accessibilityGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  
  <!-- Dashboard screen -->
  <g id="dashboard">
    <!-- Background -->
    <rect x="0" y="0" width="1080" height="1920" fill="url(#dashboardGradient)"/>
    
    <!-- Status bar -->
    <rect x="0" y="0" width="1080" height="60" fill="#ffffff" opacity="0.9"/>
    
    <!-- Navigation bar -->
    <rect x="0" y="60" width="1080" height="80" fill="#ffffff"/>
    <text x="540" y="110" font-family="Arial, sans-serif" font-size="30" font-weight="bold" text-anchor="middle" fill="#3B82F6">iMe Dashboard</text>
    
    <!-- User info card -->
    <rect x="40" y="180" width="1000" height="200" rx="15" ry="15" fill="#ffffff" filter="url(#shadow)"/>
    <circle cx="140" cy="280" r="60" fill="#3B82F6"/>
    <text x="240" y="260" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#1E3A8A">Welcome back!</text>
    <text x="240" y="310" font-family="Arial, sans-serif" font-size="28" fill="#64748B">It's April 20, 2025</text>
    
    <!-- Today's overview -->
    <rect x="40" y="420" width="1000" height="300" rx="15" ry="15" fill="#ffffff" filter="url(#shadow)"/>
    <text x="80" y="470" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A">Today's Overview</text>
    <rect x="80" y="500" width="920" height="2" fill="#E5E7EB"/>
    <text x="80" y="550" font-family="Arial, sans-serif" font-size="24" fill="#64748B">3 Events Scheduled</text>
    <text x="80" y="600" font-family="Arial, sans-serif" font-size="24" fill="#64748B">5,430 Steps (72% of Goal)</text>
    <text x="80" y="650" font-family="Arial, sans-serif" font-size="24" fill="#64748B">$120 Spent Today</text>
    
    <!-- Feature tiles -->
    <rect x="40" y="760" width="490" height="220" rx="15" ry="15" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="80" y="800" width="60" height="60" rx="15" ry="15" fill="#DBEAFE"/>
    <text x="160" y="840" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A">Schedule</text>
    <text x="80" y="900" font-family="Arial, sans-serif" font-size="24" fill="#64748B">Meeting at 2 PM</text>
    
    <rect x="550" y="760" width="490" height="220" rx="15" ry="15" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="590" y="800" width="60" height="60" rx="15" ry="15" fill="#E0F2FE"/>
    <text x="670" y="840" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A">Health</text>
    <text x="590" y="900" font-family="Arial, sans-serif" font-size="24" fill="#64748B">Sleep: 7.5 hours</text>
    
    <rect x="40" y="1000" width="490" height="220" rx="15" ry="15" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="80" y="1040" width="60" height="60" rx="15" ry="15" fill="#BFDBFE"/>
    <text x="160" y="1080" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A">Finance</text>
    <text x="80" y="1140" font-family="Arial, sans-serif" font-size="24" fill="#64748B">$2,340 of $3,000 Budget</text>
    
    <rect x="550" y="1000" width="490" height="220" rx="15" ry="15" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="590" y="1040" width="60" height="60" rx="15" ry="15" fill="#93C5FD"/>
    <text x="670" y="1080" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A">Discovery</text>
    <text x="590" y="1140" font-family="Arial, sans-serif" font-size="24" fill="#64748B">3 New Recommendations</text>
    
    <!-- Bottom navbar -->
    <rect x="0" y="1840" width="1080" height="80" fill="#ffffff" filter="url(#shadow)"/>
    <circle cx="220" cy="1880" r="30" fill="#3B82F6"/>
    <circle cx="440" cy="1880" r="30" fill="#E5E7EB"/>
    <circle cx="660" cy="1880" r="30" fill="#E5E7EB"/>
    <circle cx="880" cy="1880" r="30" fill="#E5E7EB"/>
  </g>
</svg>