<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>iMe Timer Demo</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: hsl(83, 23%, 90%);
        color: hsl(100, 15%, 20%);
        height: 100vh;
        overflow: hidden;
      }
      
      .container {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      
      header {
        padding: 2rem 1.5rem 1rem;
      }
      
      h1 {
        font-size: 1.5rem;
        font-weight: bold;
        margin: 0;
      }
      
      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        text-align: center;
      }
      
      .task-info {
        margin-bottom: 1.5rem;
      }
      
      .task-title {
        font-size: 1.25rem;
        margin-bottom: 0.5rem;
      }
      
      .task-details {
        opacity: 0.8;
        font-size: 0.875rem;
      }
      
      .timer {
        position: relative;
        width: 180px;
        height: 180px;
      }
      
      .timer-bg {
        position: absolute;
        width: 100%;
        height: 100%;
      }
      
      .timer-progress {
        position: absolute;
        width: 100%;
        height: 100%;
        transform: rotate(-90deg);
      }
      
      .timer-display {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      
      .time {
        font-size: 1.875rem;
        font-weight: bold;
      }
      
      .timer-btn {
        background-color: rgba(255, 255, 255, 0.2);
        border: none;
        border-radius: 9999px;
        padding: 0.5rem;
        margin-top: 0.5rem;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      
      .timer-btn:hover {
        background-color: rgba(255, 255, 255, 0.3);
      }
      
      .actions {
        padding: 1.5rem;
        display: flex;
        justify-content: center;
        gap: 2rem;
      }
      
      .action-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      
      .btn {
        background-color: rgba(100, 160, 70, 0.2);
        border: 2px solid hsl(100, 40%, 50%);
        border-radius: 0.375rem;
        color: hsl(100, 15%, 20%);
        width: 4rem;
        height: 4rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      
      .btn:hover {
        background-color: rgba(100, 160, 70, 0.3);
      }
      
      .btn-label {
        font-size: 0.75rem;
        margin-top: 0.5rem;
      }
      
      .bg-shape {
        position: absolute;
        background-color: hsla(100, 40%, 75%, 0.5);
        z-index: 0;
      }
      
      .top-right {
        top: 0;
        right: 0;
        width: 5rem;
        height: 5rem;
        border-bottom-left-radius: 100%;
      }
      
      .bottom-left {
        bottom: 0;
        left: 0;
        width: 8rem;
        height: 8rem;
        border-top-right-radius: 100%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header section -->
      <header>
        <h1>MY PROJECTS</h1>
      </header>
      
      <!-- Main content -->
      <div class="main-content">
        <div class="task-info">
          <h2 class="task-title">WORKING ON</h2>
          <div class="task-details">
            <div>Lai Kang</div>
            <div>Mobile app design</div>
          </div>
        </div>
        
        <div class="timer">
          <!-- Base circle -->
          <svg class="timer-bg" viewBox="0 0 100 100">
            <circle 
              cx="50" 
              cy="50" 
              r="45" 
              fill="transparent" 
              stroke="rgba(100, 160, 70, 0.2)" 
              stroke-width="4"
            />
          </svg>
          
          <!-- Progress circle -->
          <svg class="timer-progress" viewBox="0 0 100 100">
            <circle 
              cx="50" 
              cy="50" 
              r="45" 
              fill="transparent" 
              stroke="hsl(100, 40%, 50%)" 
              stroke-width="4"
              stroke-dasharray="282.7" 
              stroke-dashoffset="70.7" 
              stroke-linecap="round"
            />
          </svg>
          
          <!-- Time display -->
          <div class="timer-display">
            <span class="time">87:00</span>
            <button class="timer-btn" id="playPauseBtn">
              <svg 
                width="24" 
                height="24" 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="hsl(100, 40%, 45%)" 
                stroke-width="2" 
                stroke-linecap="round" 
                stroke-linejoin="round"
              >
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
              </svg>
            </button>
          </div>
        </div>
      </div>
      
      <!-- Action buttons -->
      <div class="actions">
        <div class="action-btn">
          <button class="btn">
            <svg 
              width="24" 
              height="24" 
              viewBox="0 0 24 24" 
              fill="none" 
              stroke="hsl(100, 40%, 45%)" 
              stroke-width="2" 
              stroke-linecap="round" 
              stroke-linejoin="round"
            >
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
          <span class="btn-label">ADD NEW</span>
        </div>
        
        <div class="action-btn">
          <button class="btn">
            <svg 
              width="24" 
              height="24" 
              viewBox="0 0 24 24" 
              fill="none" 
              stroke="white" 
              stroke-width="2" 
              stroke-linecap="round" 
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <circle cx="8.5" cy="8.5" r="1.5" />
              <circle cx="15.5" cy="8.5" r="1.5" />
              <circle cx="15.5" cy="15.5" r="1.5" />
              <circle cx="8.5" cy="15.5" r="1.5" />
            </svg>
          </button>
          <span class="btn-label">VIEW EXISTING</span>
        </div>
      </div>
      
      <!-- Background elements -->
      <div class="bg-shape top-right"></div>
      <div class="bg-shape bottom-left"></div>
    </div>
    
    <script>
      // Toggle between play and pause
      const playPauseBtn = document.getElementById('playPauseBtn');
      let isPlaying = true;
      
      playPauseBtn.addEventListener('click', function() {
        isPlaying = !isPlaying;
        if (isPlaying) {
          playPauseBtn.innerHTML = `
            <svg 
              width="24" 
              height="24" 
              viewBox="0 0 24 24" 
              fill="none" 
              stroke="white" 
              stroke-width="2" 
              stroke-linecap="round" 
              stroke-linejoin="round"
            >
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
          `;
        } else {
          playPauseBtn.innerHTML = `
            <svg 
              width="24" 
              height="24" 
              viewBox="0 0 24 24" 
              fill="none" 
              stroke="white" 
              stroke-width="2" 
              stroke-linecap="round" 
              stroke-linejoin="round"
            >
              <rect x="6" y="4" width="4" height="16"></rect>
              <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
          `;
        }
      });
    </script>
  </body>
</html>
